version: '3.8'

services:
  # 1. IL DATABASE LOCALE (Pronto per il professore)
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - db-data:/data/db # Questo salva i dati così non spariscono se spengo docker

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - database # Il backend ora aspetta che il database sia acceso
    environment:
      # Diciamo al backend di usare il database di Docker invece di quello in cloud
      - MONGODB_URI=mongodb://database:27017/notes-app-db

  frontend:
    build: ./frontend/notes-app
    ports:
      # ESTERNO : INTERNO
      # Dal tuo browser scriverai localhost:5173, ma Docker inoltrerà 
      # la richiesta alla porta 80 di Nginx dentro il container.
      - "5173:80"
    depends_on:
      - backend

# Dichiariamo il volume per il database
volumes:
  db-data: